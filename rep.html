<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loop</title>
   
</head>
<body>
    <script>
         count=0;
        setInterval(
            ()=>{
                count++;
                document.title=count;
                document.write(`<span style=
               "border:2px solid red;
               outline:3px solid red;
               padding:5px;
               margin: 5px;
               outline-offset:2px;
               display:inline-block;
               box-sizing:border-box;
                ">${count}</span><br/>`
                )
            }
        ,1000);
    </script>
</body>
</html>
